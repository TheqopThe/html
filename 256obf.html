<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Terminal RU v2.0</title>
    <style>
        :root { --bg: #fff; --txt: #000; --brd: #000; --hvr: #f4f4f4; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; }
        .panel { border: 2px solid var(--brd); padding: 20px; }
        h2 { text-align: center; border-bottom: 2px solid var(--brd); margin: 0 0 20px 0; padding-bottom: 10px; font-size: 1.1em; text-transform: uppercase; }
        
        .field-label { font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .input-container { display: flex; align-items: stretch; gap: 8px; margin-bottom: 20px; }
        .input-container textarea, .input-container input { 
            flex-grow: 1; border: 1px solid var(--brd); padding: 12px; 
            background: transparent; font-family: inherit; font-size: 14px; color: inherit;
            min-width: 0;
        }
        .input-container textarea { height: 100px; resize: none; }
        
        .masked { -webkit-text-security: disc; text-security: disc; }

        .btn-stack { display: flex; flex-direction: column; gap: 4px; }
        
        /* Исправленные кнопки и иконки */
        .icon-btn { 
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--brd); background: var(--bg); cursor: pointer; padding: 0;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--hvr); }
        .icon-btn svg { 
            width: 18px; height: 18px; 
            stroke: currentColor; fill: none; stroke-width: 2.5; 
            stroke-linecap: round; stroke-linejoin: round;
            overflow: visible; /* Гарантирует, что края не обрезаются */
        }

        .big-btn { 
            width: 100%; padding: 15px; background: #000; color: #fff; 
            border: none; cursor: pointer; font-family: inherit; font-weight: bold; 
            text-transform: uppercase; margin-bottom: 15px;
        }
        .big-btn:hover { background: #333; }

        .status { font-size: 10px; color: #888; text-align: right; height: 12px; margin-top: -15px; margin-bottom: 15px; }

        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="panel">
        <h2>ШИФРОВАНИЕ</h2>
        
        <span class="field-label">Ключ</span>
        <div class="input-container">
            <input type="text" id="kE" class="masked" placeholder="Ключ...">
            <div class="btn-stack">
                <button class="icon-btn" onclick="toggleM('kE', this)" title="Скрыть/Показать">
                    <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
                <button class="icon-btn" onclick="genK('kE')" title="Генерация"><svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3-3.5 3.5z"></path></svg></button>
            </div>
        </div>

        <span class="field-label">Исходный текст</span>
        <div class="input-container">
            <textarea id="iE" class="masked" placeholder="Текст для шифра..."></textarea>
            <div class="btn-stack">
                <button class="icon-btn" onclick="toggleM('iE', this)"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
                <button class="icon-btn" onclick="cpy('iE')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                <button class="icon-btn" onclick="pst('iE')"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
            </div>
        </div>
        <div id="msgE" class="status"></div>

        <button class="big-btn" onclick="run('enc')">Зашифровать</button>

        <span class="field-label">Результат</span>
        <div class="input-container">
            <textarea id="oE" readonly placeholder="Зашифрованный код..."></textarea>
            <div class="btn-stack">
                <button class="icon-btn" onclick="cpy('oE')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>РАСШИФРОВКА</h2>
        
        <span class="field-label">Ключ</span>
        <div class="input-container">
            <input type="text" id="kD" class="masked" placeholder="Ключ...">
            <div class="btn-stack">
                <button class="icon-btn" onclick="toggleM('kD', this)"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
                <button class="icon-btn" onclick="pst('kD')"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
            </div>
        </div>

        <span class="field-label">Зашифрованный код</span>
        <div class="input-container">
            <textarea id="iD" placeholder="Вставьте код..."></textarea>
            <div class="btn-stack">
                <button class="icon-btn" onclick="cpy('iD')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                <button class="icon-btn" onclick="pst('iD')"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
            </div>
        </div>
        <div id="msgD" class="status"></div>

        <button class="big-btn" onclick="run('dec')">Расшифровать</button>

        <span class="field-label">Оригинал</span>
        <div class="input-container">
            <textarea id="oD" class="masked" readonly placeholder="Результат..."></textarea>
            <div class="btn-stack">
                <button class="icon-btn" onclick="toggleM('oD', this)"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
                <button class="icon-btn" onclick="cpy('oD')"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
            </div>
        </div>
    </div>
</div>

<script>
    const ICON_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const ICON_OFF = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

    function toggleM(id, btn) {
        const el = document.getElementById(id);
        const svg = btn.querySelector('svg');
        if (el.classList.toggle('masked')) {
            svg.innerHTML = ICON_OFF;
        } else {
            svg.innerHTML = ICON_OPEN;
        }
    }

    async function cpy(id) {
        const val = document.getElementById(id).value;
        if(val) {
            await navigator.clipboard.writeText(val);
            toast(id.includes('E') ? 'msgE' : 'msgD', 'Скопировано');
        }
    }

    async function pst(id) {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById(id).value = text;
            toast(id.includes('E') ? 'msgE' : 'msgD', 'Вставлено');
        } catch(e) { alert("Нажмите Ctrl+V вручную"); }
    }

    function genK(id) {
        const k = Array.from(crypto.getRandomValues(new Uint8Array(16)), b => b.toString(16).padStart(2,'0')).join('');
        document.getElementById(id).value = k;
        toast('msgE', 'Ключ создан');
    }

    function toast(id, text) {
        const el = document.getElementById(id);
        if(!el) return;
        el.innerText = `[ ${text} ]`;
        setTimeout(() => el.innerText = '', 2000);
    }

    async function derive(pwd) {
        const enc = new TextEncoder();
        const base = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: enc.encode('salt-v2'), iterations: 100000, hash: 'SHA-256' },
            base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    }

    async function run(mode) {
        const isE = mode === 'enc';
        const keyVal = document.getElementById(isE ? 'kE' : 'kD').value;
        const dataVal = document.getElementById(isE ? 'iE' : 'iD').value;
        if(!keyVal || !dataVal) return alert("Заполните поля");

        try {
            const key = await derive(keyVal);
            if(isE) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const enc = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(dataVal));
                const res = new Uint8Array(iv.length + enc.byteLength);
                res.set(iv); res.set(new Uint8Array(enc), 12);
                document.getElementById('oE').value = btoa(String.fromCharCode(...res));
                toast('msgE', 'Зашифровано');
            } else {
                const raw = new Uint8Array(atob(dataVal).split('').map(c => c.charCodeAt(0)));
                const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv: raw.slice(0,12)}, key, raw.slice(12));
                document.getElementById('oD').value = new TextDecoder().decode(dec);
                toast('msgD', 'Расшифровано');
            }
        } catch(e) { alert("Ошибка ключа или данных"); }
    }
</script>
</body>
</html>
